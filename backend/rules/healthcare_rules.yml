patterns:
  # AGE: "17-year-old", "aged 55", "62 years old", "17 yo", "17 y/o"
  AGE: "\\b(?:(?:age\\s*[:=]?\\s*)?(\\d{1,3})\\s*(?:years?|yrs?|yr|y\\.?/?o\\.?|yo|years?\\s*old|year\\s*old)|aged\\s*(\\d{1,3})|(\\d{1,3})\\s*[- ]?year[- ]?old)\\b"

  DOSAGE: "\\b(\\d+(?:\\.\\d+)?)\\s*(mg|g|ml|units)\\b"

  # Frequency: qd/bid/tid/q12h/qhs/hs/prn…
  FREQUENCY: "\\b(?:once\\s*(?:a\\s*)?day|twice\\s*(?:a\\s*)?day|three\\s*times\\s*(?:a\\s*)?day|daily|every\\s*day|bid|tid|qid|qod|qd|q\\.?\\d+\\s*h(?:ours?)?|q\\s*\\d+\\s*hours?|qhs|hs|nightly|prn)\\b"

  # Route: includes punctuated forms and inhalation/nasal
  ROUTE: "\\b(?:po|p\\.o\\.|iv|i\\.v\\.|im|i\\.m\\.|sc|s\\.c\\.|subcut|oral|intravenous|intramuscular|subcutaneous|inhalation|inh|nasal)\\b"

  DATE: "\\b(?:\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\s+\\d{1,2},\\s*\\d{4})\\b"

  # Weight: "Weight was 130 pounds", "wt: 70 kg", "weight measured at 60 kg"
  WEIGHT: "\\b(?:weight|wt)\\s*(?:today\\s*)?(?:is|was|=|:|measured\\s+at|of)?\\s*(\\d{2,3})\\s*(?:pounds?|lbs?|lb|kg|kilograms?)\\b"

  # BP: require 'blood pressure' or 'bp' prefix
  BP: "\\b(?:blood\\s*pressure|bp)\\s*(?:is|was|=|:)?\\s*(\\d{2,3})\\s*/\\s*(\\d{2,3})\\b"

  GLUCOSE: "\\b(?:glucose|blood\\s*sugar|bg)\\s*(?:is|:|was)?\\s*(\\d{2,3})(?:\\s*mg/?dL)?\\b"

  # NEW: pattern that recognizes common disease abbreviations & adjectives
  # Produces type DISEASE so it works with @DISEASES in events.
  DISEASE: "\\b(?:(?:cad|htn|dm|t\\s*[12]\\s*dm|t1dm|t2dm|copd|ckd|mi|pna|chf|cva|tia|ihd)\\b|(?:diabetes(?:\\s+mellitus)?|coronary\\s+artery\\s+disease|hypertension|pneumonia|asthma|chronic\\s+kidney\\s+disease|chronic\\s+obstructive\\s+pulmonary\\s+disease|myocardial\\s+infarction|anemia|depression|anxiety|heart\\s+failure|stroke)|(?:diabetic|hypertensive|asthmatic))\\b"

events:
  MedicationAdministration:
    triggers: ["prescribed", "started on", "given", "administered", "take", "took"]
    args:
      medication: "@MEDICATIONS"
      dose: "@DOSAGE"
      route: "@ROUTE"
      frequency: "@FREQUENCY"
      time: "@DATE"

  Diagnosis:
    triggers:
      - diagnosed with
      - diagnosis
      - "diagnosis:"
      - dx
      - "dx:"
      - impression
      - "impression:"
      - assessment
      - "assessment:"
      - final diagnosis
      - clinical diagnosis
      - consistent with
      - c/w
      - evidence of
      - findings suggest
    args:
      disease: "@DISEASES"
      time: "@DATE"

  Procedure:
    triggers: ["underwent", "performed", "procedure", "surgery"]
    args:
      procedure: "@PROCEDURES"
      time: "@DATE"

  Admission:
    triggers: ["admitted on", "admission date"]
    args:
      time: "@DATE"

  Discharge:
    triggers: ["discharged on", "discharge date", "discharged"]
    args:
      time: "@DATE"
